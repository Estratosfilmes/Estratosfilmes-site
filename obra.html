<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra — estratosfilmes</title>
<link rel="icon" href="assets/uploads/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#05111A;--ink-2:#0A1B25;--ink-3:#122C37;--petrol:#124F6E;--cyan:#5491A9;--paper:#E2EAEE;--mist:#7B94A0;--maxw:1200px}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--ink);color:var(--paper);font-family:'Hanken Grotesk',sans-serif;font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--petrol);color:var(--paper)}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:2px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 30px}

  .mark{width:26px;height:26px;color:var(--cyan);flex:none}
  .wordmark{display:inline-flex;align-items:center;gap:11px;font-weight:500;font-size:1.12rem}
  .wordmark img{width:auto;display:block;height:50px}
  nav{position:sticky;top:0;z-index:100;background:rgba(5,17,26,.74);backdrop-filter:blur(12px);border-bottom:1px solid var(--ink-3)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;min-height:84px;padding:10px 0}
  .nav-links{display:flex;align-items:center;gap:34px}
  .nav-links a{font-size:.82rem;letter-spacing:.05em;color:var(--mist);transition:color .25s}
  .nav-links a:hover{color:var(--paper)}

  main{padding-top:54px;min-height:70vh}
  .back{font-family:'Space Mono',monospace;font-size:.74rem;letter-spacing:.08em;color:var(--mist);transition:color .25s;display:inline-block;margin-bottom:40px}
  .back:hover{color:var(--cyan)}

  .dhero{display:grid;grid-template-columns:0.85fr 1fr;gap:60px;align-items:start;padding-bottom:40px}
  .dposter{position:relative;aspect-ratio:2/3;border-radius:5px;overflow:hidden;border:1px solid var(--ink-3);background:linear-gradient(160deg,var(--ink-2),#091620)}
  .dposter img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .dposter .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-3)}
  .dposter .ph svg{width:46%;opacity:.4}
  .dstatus{display:inline-block;font-family:'Space Mono',monospace;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:18px}
  .dinfo h1{font-weight:300;font-size:clamp(2.2rem,5.4vw,3.6rem);line-height:1.02;letter-spacing:-.015em;margin-bottom:16px}
  .dslate{font-family:'Space Mono',monospace;font-size:.76rem;letter-spacing:.06em;color:var(--mist);margin-bottom:28px}
  .dsyn{font-size:1.1rem;color:var(--paper);max-width:50ch;margin-bottom:30px;line-height:1.7;white-space:pre-line}
  .btn{display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:.76rem;letter-spacing:.05em;background:var(--petrol);color:var(--paper);padding:13px 24px;border-radius:100px;transition:background .25s,transform .25s}
  .btn:hover{background:var(--cyan);color:var(--ink);transform:translateY(-2px)}

  .dsec{border-top:1px solid var(--ink-3);padding:56px 0}
  .dsec h2{font-weight:300;font-size:1.7rem;letter-spacing:-.01em;margin-bottom:34px}
  .ficha{display:grid;grid-template-columns:1fr 1fr;gap:2px 60px}
  .ficha .row{display:flex;justify-content:space-between;gap:20px;padding:13px 0;border-bottom:1px solid var(--ink-3)}
  .ficha .fn{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);padding-top:3px}
  .ficha .nm{text-align:right;color:var(--paper);font-weight:400}
  .fest{list-style:none;display:flex;flex-direction:column;gap:2px}
  .fest li{display:flex;justify-content:space-between;gap:24px;padding:16px 0;border-bottom:1px solid var(--ink-3);flex-wrap:wrap}
  .fest .fnome{font-weight:400;font-size:1.08rem}
  .fest .finfo{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.05em;color:var(--cyan);text-align:right}
  .watch{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .watch-item{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 22px;border:1px solid var(--ink-3);border-radius:5px;background:var(--ink-2);transition:border-color .3s,transform .3s}
  .watch-item:hover{border-color:var(--petrol);transform:translateY(-2px)}
  .watch-item .wl{font-weight:400}
  .watch-item .wt{font-family:'Space Mono',monospace;font-size:.66rem;letter-spacing:.06em;color:var(--cyan);white-space:nowrap}
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .gallery img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:4px;border:1px solid var(--ink-3)}

  .notfound{text-align:center;padding:120px 0}
  .notfound h1{font-weight:300;font-size:2rem;margin-bottom:18px}
  .notfound a{color:var(--cyan)}

  footer{border-top:1px solid var(--ink-3);margin-top:80px;padding:40px 0 72px}
  .foot-in{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.05em;color:var(--mist)}

  @media(max-width:760px){.nav-links{display:none}.dhero{grid-template-columns:1fr;gap:30px}.dposter{max-width:340px}.ficha{grid-template-columns:1fr;gap:0}.watch{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="mark" viewBox="0 0 220 220">
    <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
      <polygon points="214.0,110.0 58.0,200.1 58.0,19.9"/><polygon points="205.0,110.0 62.5,192.3 62.5,27.7"/>
      <polygon points="196.0,110.0 67.0,184.5 67.0,35.5"/><polygon points="187.0,110.0 71.5,176.7 71.5,43.3"/>
      <polygon points="178.0,110.0 76.0,168.9 76.0,51.1"/><polygon points="169.0,110.0 80.5,161.1 80.5,58.9"/>
      <polygon points="160.0,110.0 85.0,153.3 85.0,66.7"/><polygon points="151.0,110.0 89.5,145.5 89.5,74.5"/>
      <polygon points="142.0,110.0 94.0,137.7 94.0,82.3"/><polygon points="133.0,110.0 98.5,129.9 98.5,90.1"/>
      <polygon points="124.0,110.0 103.0,122.1 103.0,97.9"/>
    </g>
    <circle cx="110" cy="110" r="4.5" fill="currentColor"/>
  </symbol>
</svg>

<nav>
  <div class="wrap nav-in">
    <a class="wordmark" id="brand" href="index.html"></a>
    <div class="nav-links">
      <a href="index.html#obras">obras</a><a href="index.html#sobre">sobre</a>
      <a href="index.html#trabalhe">trabalhe conosco</a><a href="index.html#contato">contato</a>
    </div>
  </div>
</nav>

<main class="wrap" id="main"></main>

<footer>
  <div class="wrap foot-in">
    <span>© 2026 ESTRATOSFILMES · PRODUÇÕES AUDIOVISUAIS</span>
    <span>FOMENTO À CULTURA · LEI PAULO GUSTAVO · LEI GOYAZES · PNAB</span>
  </div>
</footer>

<script>
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const slug=s=>(s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  const MARK='<span class="ph"><svg><use href="#mark"/></svg></span>';
  const qs=new URLSearchParams(location.search).get('f')||'';

  function renderBrand(s){
    const size=Math.min(Math.max(parseInt(s.logo_size)||50,28),110);
    document.getElementById('brand').innerHTML=s.logo
      ? `<img src="${esc(s.logo)}" alt="estratosfilmes" style="height:${size}px">`
      : `<svg class="mark"><use href="#mark"/></svg><b>estratosfilmes</b>`;
  }
  function fichaRows(ficha){
    if(Array.isArray(ficha)) return ficha.filter(r=>r&&(r.funcao||r.nome)).map(r=>({funcao:r.funcao||'',nome:r.nome||''}));
    if(typeof ficha==='string') return ficha.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(line=>{
      const i=line.indexOf(':');
      return i===-1 ? {funcao:'',nome:line} : {funcao:line.slice(0,i).trim(),nome:line.slice(i+1).trim()};
    });
    return [];
  }
  function notFound(){
    document.getElementById('main').innerHTML=`<div class="notfound"><h1>Obra não encontrada</h1><a href="index.html#obras">← voltar para as obras</a></div>`;
  }
  function renderFilm(f){
    document.title=f.title+" — estratosfilmes";
    let html=`<a class="back" href="index.html#obras">← voltar para as obras</a>
      <section class="dhero">
        <div class="dposter">${ f.poster ? `<img src="${esc(f.poster)}" alt="${esc(f.title)}">` : MARK }</div>
        <div class="dinfo">
          ${ f.status ? `<span class="dstatus">● ${esc(f.status)}</span>`:'' }
          <h1>${esc(f.title)}</h1>
          ${ f.slate ? `<p class="dslate">${esc(f.slate)}</p>`:'' }
          ${ f.synopsis ? `<p class="dsyn">${esc(f.synopsis)}</p>`:'' }
          ${ f.trailer ? `<a class="btn" href="${esc(f.trailer)}" target="_blank" rel="noopener">▶ Assistir trailer</a>`:'' }
        </div>
      </section>`;

    const rows=fichaRows(f.ficha);
    if(rows.length){
      html+=`<section class="dsec"><h2>Ficha técnica</h2><div class="ficha">`+
        rows.map(r=>`<div class="row"><span class="fn">${esc(r.funcao)}</span><span class="nm">${esc(r.nome)}</span></div>`).join('')+
        `</div></section>`;
    }
    if(Array.isArray(f.assistir) && f.assistir.filter(x=>x&&x.link).length){
      html+=`<section class="dsec"><h2>Assistir online</h2><div class="watch">`+
        f.assistir.filter(x=>x&&x.link).map(x=>
          `<a class="watch-item" href="${esc(x.link)}" target="_blank" rel="noopener"><span class="wl">${esc(x.titulo||'Assistir')}</span><span class="wt">▶ YouTube</span></a>`).join('')+
        `</div></section>`;
    }
    if(Array.isArray(f.festivais) && f.festivais.filter(x=>x&&(x.nome||x.info)).length){
      html+=`<section class="dsec"><h2>Festivais e prêmios</h2><ul class="fest">`+
        f.festivais.filter(x=>x&&(x.nome||x.info)).map(x=>
          `<li><span class="fnome">${esc(x.nome)}</span>${ x.info ? `<span class="finfo">${esc(x.info)}</span>`:'' }</li>`).join('')+
        `</ul></section>`;
    }
    if(Array.isArray(f.gallery) && f.gallery.filter(Boolean).length){
      html+=`<section class="dsec"><h2>Galeria</h2><div class="gallery">`+
        f.gallery.filter(Boolean).map(src=>`<img src="${esc(src)}" alt="${esc(f.title)}">`).join('')+
        `</div></section>`;
    }
    document.getElementById('main').innerHTML=html;
  }
  async function getJSON(p,fb){try{const r=await fetch(p,{cache:"no-store"});if(!r.ok)throw 0;return await r.json();}catch(e){return fb;}}
  (async()=>{
    const site=await getJSON('data/site.json',{logo:"",logo_size:50});
    renderBrand(site);
    const films=await getJSON('data/films.json',{items:[]});
    const f=(films.items||[]).find(x=>slug(x.title)===qs);
    f ? renderFilm(f) : notFound();
  })();
</script>
</body>
</html>
