###############################################################################
#  PAINEL estratosfilmes — configuração do Sveltia CMS
###############################################################################

backend:
  name: github
  repo: Estratosfilmes/Estratosfilmes-site
  branch: main
  base_url: https://sveltia-cms-auth.contato-3aa.workers.dev

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: pt

collections:
  # ---------------------------------------------------------------------------
  - name: identidade
    label: "Identidade e contato"
    delete: false
    files:
      - name: site
        label: "Logo, frases e contatos"
        file: "data/site.json"
        fields:
          - { name: logo, label: "Logo (PNG com fundo transparente)", widget: image, required: false }
          - { name: tagline, label: "Frase principal (topo do site)", widget: string }
          - { name: lede, label: "Subtítulo (abaixo da frase)", widget: text }
          - { name: email, label: "E-mail", widget: string }
          - { name: phone, label: "Telefone", widget: string }
          - { name: whatsapp, label: "Link do WhatsApp", widget: string, required: false, hint: "Ex.: https://wa.me/5562991560999" }
          - { name: instagram, label: "Link do Instagram", widget: string, required: false }
          - { name: youtube, label: "Link do YouTube", widget: string, required: false }
          - { name: vimeo, label: "Link do Vimeo", widget: string, required: false }
          - { name: linkedin, label: "Link do LinkedIn", widget: string, required: false }
          - { name: portfolio, label: "Link do PDF do portfólio", widget: string, required: false }

  # ---------------------------------------------------------------------------
  - name: filmes
    label: "Filmes"
    delete: false
    files:
      - name: lista
        label: "Lista de filmes"
        file: "data/films.json"
        fields:
          - name: items
            label: "Filmes"
            label_singular: "Filme"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Título", widget: string }
              - { name: poster, label: "Cartaz (vertical, proporção 2:3)", widget: image, required: false }
              - { name: slate, label: "Formato e ano", widget: string, required: false, hint: "Ex.: Curta-metragem / 2025" }
              - { name: status, label: "Status", widget: string, required: false, hint: "Ex.: Em distribuição (deixe vazio se quiser)" }
              - { name: synopsis, label: "Sinopse", widget: text, required: false }
              - name: ficha
                label: "Ficha técnica"
                label_singular: "Item"
                widget: list
                required: false
                summary: "{{fields.funcao}}: {{fields.nome}}"
                fields:
                  - { name: funcao, label: "Função", widget: string, hint: "Ex.: Direção, Roteiro, Fotografia" }
                  - { name: nome, label: "Nome", widget: string }
              - name: festivais
                label: "Festivais e prêmios"
                label_singular: "Festival / prêmio"
                widget: list
                required: false
                summary: "{{fields.nome}}"
                fields:
                  - { name: nome, label: "Festival ou prêmio", widget: string }
                  - { name: info, label: "Detalhe", widget: string, required: false, hint: "Ex.: Seleção oficial 2025 / Melhor curta" }
              - name: gallery
                label: "Galeria de fotos"
                label_singular: "Foto"
                widget: list
                required: false
                field: { name: image, label: "Foto", widget: image }
              - { name: trailer, label: "Link do trailer", widget: string, required: false, hint: "Ex.: link do YouTube ou Vimeo" }
